<h2 class="title">Make an Enquiry</h2>

<p class="subtitle">
Ask about pricing, availability, product compatibility, or partnership opportunities.
</p>

<!-- ENQUIRY FORM -->
<div class="form-wrapper">

<form onsubmit="return submitEnquiry()">

<label>Full Name</label>
<input type="text" id="enq-name" placeholder="Your name">

<div class="error" id="enqNameError"></div>

<label>Email Address</label>
<input type="email" id="enq-email" placeholder="Your email">

<div class="error" id="enqEmailError"></div>

<label>Enquiry Type</label>
<select id="enq-type">

<option value="">Select option</option>
<option value="product">Product Pricing</option>
<option value="availability">Product Availability</option>
<option value="volunteer">Volunteering</option>
<option value="sponsor">Sponsorship</option>

</select>

<div class="error" id="enqTypeError"></div>

<label>Message</label>
<textarea id="enq-message" placeholder="Describe your enquiry"></textarea>

<div class="error" id="enqMessageError"></div>

<button type="submit">Submit Enquiry</button>

</form>

</div>

<!-- RESPONSE OUTPUT BOX -->
<div id="enquiryResponse" class="response-box"></div>

<footer>

</footer>
